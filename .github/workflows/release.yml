name: Release ZIP

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create ZIP
        run: |
          zip -r wsl-dev-pack-release.zip . -x "*.git*"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: wsl-dev-pack-release.zip
