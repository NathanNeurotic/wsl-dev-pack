name: Release Package and Attest

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build release ZIP
        run: |
          rm -f wsl-dev-pack-release.zip
          zip -r wsl-dev-pack-release.zip . \
            -x ".git/*" ".github/*" "dist/*" "*.git*" "wsl-dev-pack-release.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: wsl-dev-pack-release
          path: wsl-dev-pack-release.zip

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: wsl-dev-pack-release.zip

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          files: wsl-dev-pack-release.zip
