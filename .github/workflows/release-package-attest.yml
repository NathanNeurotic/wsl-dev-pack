name: Release Package and Attest

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  RELEASE_ZIP: wsl-dev-pack-${{ github.ref_name }}.zip

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build release ZIP
        run: |
          rm -f "$RELEASE_ZIP"
          zip -r "$RELEASE_ZIP" . \
            -x ".git/*" ".github/*" "dist/*" "*.git*" "$RELEASE_ZIP"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.ref_name }}
          path: ${{ env.RELEASE_ZIP }}
          if-no-files-found: error

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ env.RELEASE_ZIP }}

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          name: WSL Dev Pack ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: ${{ env.RELEASE_ZIP }}
          generate_release_notes: true
