name: Windows WSL Smoke Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show runner info
        run: |
          Write-Host "Runner OS: $env:RUNNER_OS"
          Write-Host "Workspace: $env:GITHUB_WORKSPACE"
          $PSVersionTable

      - name: Ensure wsl.exe is present
        run: |
          $wsl = Get-Command wsl.exe -ErrorAction SilentlyContinue
          if (-not $wsl) {
            throw "wsl.exe is not available on this runner."
          }

          Write-Host "wsl.exe found at: $($wsl.Source)"

      - name: Probe current WSL state (non-fatal)
        run: |
          Write-Host "WSL status:"
          & wsl.exe --status
          $statusExit = $LASTEXITCODE
          Write-Host "wsl --status exit code: $statusExit"

          Write-Host ""
          Write-Host "Checking installed distros (non-fatal if none exist)..."

          $distrosOutput = & wsl.exe --list --quiet 2>$null
          $listExit = $LASTEXITCODE

          if ($listExit -ne 0) {
            Write-Host "No installed distros detected yet."
            $global:LASTEXITCODE = 0
          }
          else {
            $distros = @(
              $distrosOutput |
              ForEach-Object { "$_".Trim() } |
              Where-Object { $_ }
            )

            if ($distros.Count -eq 0) {
              Write-Host "No installed distros detected yet."
            }
            else {
              Write-Host "Installed distros:"
              $distros | ForEach-Object { Write-Host " - $_" }
            }
          }

      - name: Install Ubuntu if missing
        run: |
          $distrosOutput = & wsl.exe --list --quiet 2>$null
          $listExit = $LASTEXITCODE

          $distros = @()
          if ($listExit -eq 0) {
            $distros = @(
              $distrosOutput |
              ForEach-Object { "$_".Trim() } |
              Where-Object { $_ }
            )
          }

          if ($distros -contains "Ubuntu") {
            Write-Host "Ubuntu already installed."
          }
          else {
            Write-Host "Ubuntu not found."

            Write-Host ""
            Write-Host "Available distros:"
            & wsl.exe --list --online
            $global:LASTEXITCODE = 0

            Write-Host ""
            Write-Host "Installing Ubuntu..."
            & wsl.exe --install Ubuntu

            if ($LASTEXITCODE -ne 0) {
              throw "Failed to install Ubuntu."
            }
          }

      - name: Wait for Ubuntu registration
        run: |
          $maxAttempts = 30
          $sleepSeconds = 10
          $found = $false

          for ($i = 1; $i -le $maxAttempts; $i++) {
            $distrosOutput = & wsl.exe --list --quiet 2>$null
            $listExit = $LASTEXITCODE

            if ($listExit -eq 0) {
              $distros = @(
                $distrosOutput |
                ForEach-Object { "$_".Trim() } |
                Where-Object { $_ }
              )

              if ($distros -contains "Ubuntu") {
                $found = $true
                Write-Host "Ubuntu registered."
                break
              }
            }

            Write-Host "Ubuntu not registered yet. Waiting ($i/$maxAttempts)..."
            Start-Sleep -Seconds $sleepSeconds
          }

          if (-not $found) {
            throw "Ubuntu distro was not registered in time."
          }

      - name: Initialize Ubuntu
        run: |
          & wsl.exe -d Ubuntu -- bash -lc "echo 'Ubuntu ready'; uname -a; whoami; pwd"
          if ($LASTEXITCODE -ne 0) {
            throw "Ubuntu failed to initialize."
          }

      - name: Show final WSL state
        run: |
          & wsl.exe --status
          if ($LASTEXITCODE -ne 0) {
            throw "wsl --status failed after installation."
          }

          & wsl.exe --list --verbose
          if ($LASTEXITCODE -ne 0) {
            throw "wsl --list --verbose failed after installation."
          }

      - name: Run installer smoke flow
        run: |
          Write-Host "Replace this placeholder with your unattended installer flow when ready."
          Write-Host "Example:"
          Write-Host ".\setup-wsl-dev.ps1 -NonInteractive"

      - name: Post-install smoke verification
        run: |
          if (-not (Test-Path ".\scripts\Invoke-WSLSmoke.ps1")) {
            throw "Missing script: .\scripts\Invoke-WSLSmoke.ps1"
          }

          .\scripts\Invoke-WSLSmoke.ps1 -Distro Ubuntu
