name: Windows WSL Smoke Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect WSL availability
        run: |
          $wsl = Get-Command wsl.exe -ErrorAction SilentlyContinue
          if (-not $wsl) {
            throw "wsl.exe is not available on this runner."
          }

          wsl.exe --status
          $distros = @(wsl.exe --list --quiet | ForEach-Object { $_.Trim() } | Where-Object { $_ })
          if ($distros.Count -eq 0) {
            throw "WSL is present, but no distributions are installed."
          }

          Write-Host "Installed distros:"
          $distros | ForEach-Object { Write-Host " - $_" }

      - name: Run smoke verification script
        run: |
          .\scripts\Invoke-WSLSmoke.ps1
